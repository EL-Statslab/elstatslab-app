name: Keep Streamlit Awake

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping elstatslab
        run: |
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               -L --max-time 30 \
               https://elstatslab.streamlit.app/ \
               -o /dev/null -s -w "HTTP status: %{http_code}\n"
