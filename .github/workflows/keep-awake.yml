name: Keep Streamlit Awake

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Visit elstatslab with real browser
        run: |
          npx playwright@latest open --browser chromium https://elstatslab.streamlit.app/ &
          sleep 20
          echo "Done"
